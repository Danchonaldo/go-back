services:
  db:
    image: postgres:15-alpine
    container_name: taskboard_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Dancho2005
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification_service:
    build:
      context: ./notification_service
    container_name: notification_service
    restart: always
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  main_service:
    build:
      context: ./main_service
    container_name: main_service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      db:
        condition: service_healthy
      notification_service:
        condition: service_started
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: Dancho2005
      DB_NAME: postgres
      DB_PORT: 5432
      JWT_SECRET: taskboard_super_secret_jwt_key_2024
      NOTIFICATION_SERVICE_URL: http://notification_service:8083

  frontend:
    build:
      context: ./frontend
    container_name: taskboard_frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - main_service
    environment:
      - REACT_APP_API_URL=http://localhost:8082

volumes:
  postgres_data:
